<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmokeDash - 网络延迟监控</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          <h1>SmokeDash</h1>
        </div>
        <div class="header-stats">
          <span class="header-stat"><strong id="totalNodes">-</strong> 个节点</span>
          <span class="header-stat-divider">|</span>
          <span class="header-stat">更新于 <strong id="lastUpdated">-</strong></span>
        </div>
        <div class="header-right">
          <button class="filter-toggle" id="filterToggle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="4" y1="6" x2="20" y2="6"></line>
              <line x1="8" y1="12" x2="20" y2="12"></line>
              <line x1="12" y1="18" x2="20" y2="18"></line>
            </svg>
            <span>筛选</span>
          </button>
          <div class="header-filters" id="headerFilters">
            <div class="filter-group" id="ispFilters">
              <button class="filter-btn isp-btn active" data-isp="CT">电信</button>
              <button class="filter-btn isp-btn" data-isp="CU">联通</button>
              <button class="filter-btn isp-btn" data-isp="CM">移动</button>
            </div>
            <div class="filter-group" id="cityFilters">
              <button class="filter-btn city-btn active" data-city="shenzhen">深圳</button>
              <button class="filter-btn city-btn" data-city="shanghai">上海</button>
              <button class="filter-btn city-btn" data-city="beijing">北京</button>
            </div>
            <div class="time-range-selector">
              <button class="range-btn active" data-range="3h">3h</button>
              <button class="range-btn" data-range="30h">30h</button>
              <button class="range-btn" data-range="10d">10d</button>
              <button class="range-btn" data-range="360d">360d</button>
            </div>
          </div>
          <div class="header-actions">
          <button class="deploy-btn" id="deployBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <span>管理</span>
          </button>
          <button class="refresh-btn" id="refreshBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="nodes-grid" id="nodesGrid">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="nodeModal">
        <div class="modal-header">
          <h2 id="modalTitle">管理员登录</h2>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=7"></script>
</body>
</html>
